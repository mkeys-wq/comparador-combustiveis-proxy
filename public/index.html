<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root{
    --bg:#05070C; --panel:rgba(10,14,24,0.74); --panel-solid:#0E1420;
    --line:rgba(148,178,255,0.16); --line-strong:rgba(148,178,255,0.3);
    --text:#E8ECFB; --text-muted:#8892B8; --text-faint:#5A6488;
    --cyan:#22D3EE; --violet:#8B5CF6; --magenta:#EC4899;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body,#root{ background:var(--bg); }
  .app-wrap{ background:var(--bg); min-height:100%; padding:20px 10px; display:flex; justify-content:center; font-family:'Inter',sans-serif; color:var(--text); }
  .phone{ width:100%; max-width:420px; height:min(780px,92vh); background:var(--panel-solid); border-radius:32px; border:1px solid var(--line); overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,0.55); position:relative; }
  .display{ font-family:'Rajdhani',sans-serif; }
  .mono{ font-family:'JetBrains Mono',monospace; }

  .map-stage{ position:absolute; inset:0; }
  #map{ position:absolute; inset:0; background:#04070D; }
  #mapFallback{ position:absolute; inset:0; background:#04070D; display:none; }
  .dark-tiles{ filter:invert(1) hue-rotate(200deg) brightness(0.82) contrast(1.05) saturate(0.55); }
  .leaflet-control-layers{ background:var(--panel) !important; backdrop-filter:blur(10px); color:var(--text) !important; border:1px solid var(--line) !important; border-radius:10px !important; }
  .leaflet-control-layers label{ color:var(--text) !important; font-size:12px; }
  .leaflet-control-zoom{ display:none; }
  .leaflet-top.leaflet-right{ margin-top:60px !important; margin-right:14px !important; }
  .leaflet-control-attribution{ background:rgba(5,7,12,0.7) !important; color:var(--text-faint) !important; font-size:9px; }
  .leaflet-control-attribution a{ color:var(--text-muted) !important; }
  .leaflet-popup-content-wrapper{ background:var(--panel-solid); color:var(--text); border-radius:10px; border:1px solid var(--line); }
  .leaflet-popup-tip{ background:var(--panel-solid); }
  .popup-name{ font-weight:700; font-size:12.5px; margin-bottom:2px; }
  .popup-sub{ font-size:11px; color:var(--text-muted); margin-bottom:4px; }
  .popup-power{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; }

  /* ---------- floating glass chrome ---------- */
  .glass{ background:var(--panel); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--line); }

  .topbar{ position:absolute; top:14px; left:14px; right:14px; z-index:500; display:flex; gap:8px; align-items:center; }
  .brand-pill{ display:flex; align-items:center; gap:6px; padding:9px 12px; border-radius:14px; }
  .brand{ font-size:17px; font-weight:700; letter-spacing:0.5px; line-height:1; }
  .brand .plus{ background:linear-gradient(135deg,var(--cyan),var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .loc-pill{ flex:1; display:flex; align-items:center; gap:6px; padding:10px 12px; border-radius:14px; cursor:pointer; min-width:0; }
  .loc-pill span{ flex:1; font-size:12.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .icon-pill{ width:38px; height:38px; border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--text-muted); font-size:15px; }
  .icon-pill.active{ color:var(--cyan); border-color:rgba(34,211,238,0.4); }
  #filterTrigger span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #filterTrigger.active{ color:var(--cyan); border-color:rgba(34,211,238,0.4); }

  .info-box{ position:absolute; top:64px; left:14px; right:14px; z-index:499; font-size:11.5px; line-height:1.5; color:var(--text-muted); border-radius:12px; padding:10px 12px; display:none; }
  .info-box.open{ display:block; }
  .info-box b{ color:var(--cyan); font-weight:600; }

  /* filter popover panel */
  .filter-panel{ position:absolute; top:64px; left:14px; right:14px; z-index:499; border-radius:16px; padding:12px; display:none; flex-direction:column; gap:10px; }
  .filter-panel.open{ display:flex; }
  .filter-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ flex:0 0 auto; padding:7px 11px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,0.03); color:var(--text-muted); font-size:11.5px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .chip.active-slow{ border-color:var(--cyan); background:rgba(34,211,238,0.15); color:var(--cyan); }
  .chip.active-fast{ border-color:var(--violet); background:rgba(139,92,246,0.15); color:var(--violet); }
  .chip.active-ultra{ border-color:var(--magenta); background:rgba(236,72,153,0.15); color:var(--magenta); }
  .chip.active-neutral{ border-color:var(--text-muted); background:rgba(255,255,255,0.06); color:var(--text); }
  .chip.active-free{ border-color:#34D399; background:rgba(52,211,153,0.15); color:#34D399; }

  /* zoom control */
  .zoom-control{ position:absolute; right:14px; top:170px; width:44px; border-radius:16px; display:flex; flex-direction:column; align-items:center; z-index:400; overflow:hidden; }
  .zoom-btn{ width:44px; height:44px; border:none; background:transparent; color:var(--text); font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .zoom-btn:active{ background:rgba(34,211,238,0.12); color:var(--cyan); }
  .zoom-divider{ width:26px; height:1px; background:var(--line); }

  .map-empty{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; color:var(--text-muted); font-size:12.5px; text-align:center; padding:30px; z-index:300; }
  .map-banner{ position:absolute; top:170px; left:14px; right:66px; z-index:497; font-size:10.5px; line-height:1.4; color:var(--violet); border-radius:10px; padding:8px 10px; display:none; }
  .map-banner.show{ display:block; }

  .recenter-btn{ position:absolute; right:14px; z-index:400; width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); }

  /* distance HUD */
  .distance-hud{ position:absolute; left:14px; right:14px; bottom:140px; z-index:600; border-radius:18px; padding:12px 14px; display:none; gap:10px; align-items:center; }
  .distance-hud.show{ display:flex; }
  .distance-hud .info{ flex:1; min-width:0; }
  .distance-hud .name{ font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .distance-hud .sub{ font-size:10.5px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .distance-hud .tags{ display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
  .distance-hud .tag{ font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:6px; background:rgba(255,255,255,0.06); color:var(--text-muted); text-transform:uppercase; }
  .distance-hud .nav-tag{ display:inline-flex; align-items:center; gap:3px; text-decoration:none; border:1px solid var(--cyan); color:var(--cyan); background:rgba(34,211,238,0.1); font-size:9.5px; padding:4px 8px; text-transform:none; letter-spacing:0.2px; }
  .distance-hud .dist-block{ text-align:center; flex-shrink:0; padding:0 8px; border-left:1px solid var(--line); }
  .distance-hud .dist-val{ font-size:20px; font-weight:700; color:var(--cyan); line-height:1; }
  .distance-hud .dist-unit{ font-size:8.5px; color:var(--text-faint); text-transform:uppercase; }
  .distance-hud .close-btn{ background:none; border:none; color:var(--text-faint); font-size:16px; cursor:pointer; flex-shrink:0; padding:2px; }

  .hud-line{ animation:dashscroll 0.9s linear infinite; }
  @keyframes dashscroll{ to{ stroke-dashoffset:-16; } }

  /* carousel */
  .carousel-wrap{ position:absolute; left:0; right:0; bottom:0; z-index:400; padding:10px 0 14px; }
  .carousel{ display:flex; gap:8px; overflow-x:auto; padding:0 14px; scroll-snap-type:x proximity; }
  .carousel::-webkit-scrollbar{ display:none; }
  .ev-card{ scroll-snap-align:start; flex:0 0 auto; width:150px; border-radius:16px; padding:10px 11px; cursor:pointer; }
  .ev-card.selected{ border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan); }
  .ev-card .top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
  .ev-card .name{ font-size:12px; font-weight:700; line-height:1.25; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .ev-card .power{ font-size:15px; font-weight:700; font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .ev-card .sub{ font-size:10px; color:var(--text-muted); margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-card .dist{ font-size:10px; color:var(--text-faint); margin-top:2px; }
  .empty-card{ padding:16px 14px; text-align:center; color:var(--text-muted); font-size:12px; border-radius:16px; margin:0 14px; flex:1; }
  .loading-card{ padding:16px 14px; text-align:center; color:var(--cyan); font-size:12px; border-radius:16px; margin:0 14px; flex:1; display:flex; align-items:center; justify-content:center; gap:8px; }
  .loading-dot{ width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:pulseDot 1s ease-in-out infinite; }
  .loading-dot:nth-child(2){ animation-delay:0.15s; }
  .loading-dot:nth-child(3){ animation-delay:0.3s; }
  @keyframes pulseDot{ 0%,100%{ opacity:0.25; transform:scale(0.8); } 50%{ opacity:1; transform:scale(1.1); } }

  .pin-dot{ border-radius:50%; border:2px solid var(--bg); display:flex; align-items:center; justify-content:center; font-size:9px; }
  .pin-dot.selected{ box-shadow:0 0 0 2px var(--bg), 0 0 0 4px currentColor, 0 0 14px 2px currentColor; }
  .center-pin{ width:20px; height:20px; border-radius:50%; background:radial-gradient(circle,var(--cyan),var(--violet)); border:3px solid #fff; box-shadow:0 0 0 8px rgba(34,211,238,0.2); cursor:grab; }

  /* location sheet */
  .sheet-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:flex-end; justify-content:center; z-index:900; }
  .sheet-backdrop.open{ display:flex; }
  .sheet{ width:100%; max-width:420px; background:var(--panel-solid); border-top-left-radius:24px; border-top-right-radius:24px; border:1px solid var(--line); padding:18px; max-height:82vh; overflow-y:auto; animation:slideUp .2s ease-out; }
  @keyframes slideUp{ from{ transform:translateY(20px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .sheet-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .sheet-title{ font-size:17px; font-weight:700; }
  .sheet-close{ background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; }
  .btn-primary{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:rgba(34,211,238,0.08); border:1px solid var(--cyan); border-radius:12px; padding:12px 14px; color:var(--cyan); font-weight:600; font-size:13.5px; cursor:pointer; margin-bottom:8px; }
  .geo-status{ font-size:11.5px; color:var(--text-muted); margin-bottom:10px; min-height:14px; }
  .search-wrap{ position:relative; margin-bottom:10px; }
  .search-wrap svg{ position:absolute; left:12px; top:12px; }
  .search-input{ width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--line); border-radius:12px; padding:10px 12px 10px 32px; color:var(--text); font-size:13px; outline:none; }
  .eyebrow{ font-size:11px; color:var(--text-faint); margin:14px 0 6px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
  .town-btn{ display:flex; align-items:center; gap:8px; background:transparent; border:none; border-radius:10px; padding:10px; color:var(--text); font-size:13px; text-align:left; cursor:pointer; width:100%; }
  .town-btn.active{ background:rgba(255,255,255,0.06); }
  .town-btn:hover{ background:rgba(255,255,255,0.04); }
  .manual-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .manual-grid input{ width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--line); border-radius:10px; padding:10px; color:var(--text); font-size:13px; outline:none; }
  .btn-secondary{ width:100%; background:linear-gradient(135deg,var(--cyan),var(--violet)); border:none; border-radius:12px; padding:11px; color:#05070C; font-weight:700; font-size:13px; cursor:pointer; margin-bottom:16px; }
</style>

<div class="app-wrap">
  <div class="phone">
    <div class="map-stage">
      <div id="map"></div>
      <div id="mapFallback"></div>

      <div class="topbar">
        <div class="brand-pill glass"><span class="brand display">CARGA<span class="plus">+</span></span></div>
        <button class="loc-pill glass" id="locBar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="locLabel">Arouca, Aveiro</span>
        </button>
        <button class="loc-pill glass" id="filterTrigger" title="Filtros" style="flex:0 0 auto; max-width:140px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
          <span id="filterTriggerLabel">Filtros</span>
        </button>
        <button class="icon-pill glass" id="infoBtn">ⓘ</button>
      </div>

      <div class="info-box glass" id="infoBox">
        Localização, potência e tomada são <b>dados reais</b> do <b>OpenStreetMap</b> (comunidade). Não existe fonte
        pública com o preço exato em tempo real por posto, por isso não o mostramos.
      </div>

      <div class="filter-panel glass" id="filterPanel">
        <div class="filter-row" id="powerFilters"></div>
        <div class="filter-row" id="connectorFilters"></div>
      </div>

      <div class="map-banner glass" id="mapBanner"></div>

      <div class="zoom-control glass" id="zoomControl">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
      </div>

      <button class="recenter-btn glass" id="recenterBtn" style="bottom:150px;" title="Recentrar">◎</button>
      <button class="icon-pill glass" id="mapToggle" style="position:absolute; right:14px; bottom:196px; z-index:400;" title="Vista simplificada">⛶</button>

      <div class="distance-hud glass" id="distanceHud">
        <div class="info">
          <div class="name" id="hudName"></div>
          <div class="sub" id="hudSub"></div>
          <div class="tags" id="hudTags"></div>
        </div>
        <div class="dist-block">
          <div class="dist-val mono" id="hudDist">—</div>
          <div class="dist-unit" id="hudDistUnit">km</div>
        </div>
        <button class="close-btn" id="hudClose">✕</button>
      </div>

      <div class="carousel-wrap">
        <div class="carousel" id="carousel"></div>
      </div>

      <div style="position:absolute; left:6px; bottom:2px; z-index:50; font-size:8px; color:rgba(138,150,190,0.35); font-family:'JetBrains Mono',monospace;">build: zoom-v3</div>
    </div>
  </div>
</div>

<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title display">Localização</div>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>

    <button class="btn-primary" id="geoBtn">📍 Usar a minha localização atual</button>
    <div class="geo-status" id="geoStatus"></div>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5A6488" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="townSearch" placeholder="Procurar morada, localidade ou zona em Portugal…" />
    </div>
    <div class="geo-status" id="searchStatus"></div>

    <div class="eyebrow" id="townListLabel">Sugestões</div>
    <div id="townList"></div>
  </div>
</div>

<script>
(function(){
  const C = { cyan:'#22D3EE', violet:'#8B5CF6', magenta:'#EC4899' };

  const TOWNS = [
    { name:'Arouca, Aveiro', lat:40.9333, lon:-8.2500 },
    { name:'Vale de Cambra, Aveiro', lat:40.8422, lon:-8.4004 },
    { name:'São João da Madeira, Aveiro', lat:40.9006, lon:-8.4867 },
    { name:'Oliveira de Azeméis, Aveiro', lat:40.8422, lon:-8.4757 },
    { name:'Santa Maria da Feira, Aveiro', lat:40.9257, lon:-8.5486 },
    { name:'Castelo de Paiva, Aveiro', lat:41.0333, lon:-8.2833 },
    { name:'Cinfães, Viseu', lat:41.0667, lon:-8.1167 },
    { name:'Aveiro (cidade)', lat:40.6405, lon:-8.6538 },
    { name:'Porto', lat:41.1579, lon:-8.6291 },
    { name:'Viseu', lat:40.6566, lon:-7.9122 },
    { name:'Coimbra', lat:40.2033, lon:-8.4103 },
    { name:'Lisboa', lat:38.7223, lon:-9.1393 },
  ];

  const POWER_TIERS = [
    { key:'slow', label:'Lenta ≤22kW', color:C.cyan, test:(p)=> p!=null && p<=22 },
    { key:'fast', label:'Rápida 23-99kW', color:C.violet, test:(p)=> p!=null && p>22 && p<100 },
    { key:'ultra', label:'Ultra ≥100kW', color:C.magenta, test:(p)=> p!=null && p>=100 },
  ];

  const CONNECTOR_TYPES = [
    { key:'type2', label:'Tipo 2', match:(c)=> c.includes('type2') && !c.includes('combo') },
    { key:'ccs', label:'CCS', match:(c)=> c.includes('combo') },
    { key:'chademo', label:'CHAdeMO', match:(c)=> c.includes('chademo') },
    { key:'tesla', label:'Tesla', match:(c)=> c.includes('tesla') },
  ];

  const toRad = d => d * Math.PI / 180;
  function distanceKm(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function bearingDeg(lat1, lon1, lat2, lon2){
    const y = Math.sin(toRad(lon2-lon1)) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));
    return Math.atan2(y, x) * 180 / Math.PI;
  }
  function zoomForRadius(r){
    if (r<=0) return 13;
    if (r<=2) return 14;
    if (r<=5) return 13;
    if (r<=8) return 12;
    if (r<=12) return 11.3;
    if (r<=18) return 10.6;
    if (r<=24) return 10;
    return 9.5;
  }
  function powerTierOf(p){
    if (p == null) return null;
    for (const t of POWER_TIERS) if (t.test(p)) return t;
    return null;
  }
  function colorForPower(p){
    const t = powerTierOf(p);
    return t ? t.color : '#7C88AD';
  }

  const SEARCH_RADIUS_KM = 20; // raio fixo de pesquisa (não ajustável pelo utilizador)

  const state = {
    center: TOWNS[0], selectedId: null,
    powerFilter: 'all', connectorFilter: 'all', freeOnly: false,
  };
  let renderToken = 0;

  // ---------- map init ----------
  let usingFallbackMap = false;
  let tileLoadedOnce = false;

  const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([state.center.lat, state.center.lon], zoomForRadius(SEARCH_RADIUS_KM));

  function recenterMap(){
    map.setView([state.center.lat, state.center.lon], zoomForRadius(SEARCH_RADIUS_KM));
  }

  const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM', maxZoom: 19, className: 'dark-tiles'
  }).addTo(map);

  const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri', maxZoom: 19
  });

  L.control.layers({ 'Mapa': streetLayer, 'Satélite': satelliteLayer }, null, { position: 'topright' }).addTo(map);

  map.on('tileload', () => { tileLoadedOnce = true; hideMapBanner(); });
  function hideMapBanner(){ document.getElementById('mapBanner').classList.remove('show'); }

  setTimeout(() => {
    if (!tileLoadedOnce && !usingFallbackMap){
      const banner = document.getElementById('mapBanner');
      banner.textContent = 'Imagens do mapa indisponíveis. A usar vista simplificada.';
      banner.classList.add('show');
      setFallbackMode(true);
    }
  }, 5000);

  document.getElementById('mapToggle').addEventListener('click', () => {
    setFallbackMode(!usingFallbackMap);
    if (!usingFallbackMap) hideMapBanner();
  });

  function setFallbackMode(on){
    usingFallbackMap = on;
    document.getElementById('map').style.display = on ? 'none' : 'block';
    document.getElementById('mapFallback').style.display = on ? 'block' : 'none';
    document.getElementById('mapToggle').classList.toggle('active', on);
    if (on) setTimeout(() => renderAll(), 0);
    else { setTimeout(() => map.invalidateSize(), 100); renderAll(); }
  }

  let radiusCircle = L.circle([state.center.lat, state.center.lon], {
    radius: SEARCH_RADIUS_KM*1000, color: C.cyan, weight: 1.2, fillColor: C.cyan, fillOpacity: 0.05
  }).addTo(map);

  const centerIcon = L.divIcon({ className:'', html:'<div class="center-pin"></div>', iconSize:[20,20], iconAnchor:[10,10] });
  let centerMarker = L.marker([state.center.lat, state.center.lon], { icon: centerIcon, draggable: true, zIndexOffset: 1000 }).addTo(map);
  centerMarker.on('dragend', () => {
    const ll = centerMarker.getLatLng();
    state.center = { name: 'Localização escolhida no mapa', lat: ll.lat, lon: ll.lng };
    renderAll();
  });

  document.getElementById('recenterBtn').addEventListener('click', () => {
    recenterMap();
  });

  let markersLayer = L.layerGroup().addTo(map);
  const markersById = {};
  let hudLine = null;

  // ---------- data ----------
  let rawStations = [];
  let lastFetchKey = '';

  async function fetchStations(){
    const key = `${state.center.lat.toFixed(3)},${state.center.lon.toFixed(3)}`;
    if (key === lastFetchKey) return rawStations;
    isLoadingStations = true;
    renderLoadingState();
    const url = `/api/ev-postos?lat=${state.center.lat}&lon=${state.center.lon}&raio=${SEARCH_RADIUS_KM}`;
    try {
      const res = await fetch(url);
      if (!res.ok) return rawStations;
      const json = await res.json();
      if (!Array.isArray(json.stations)) return rawStations;
      rawStations = json.stations;
      lastFetchKey = key;
      return rawStations;
    } catch (e) {
      return rawStations;
    } finally {
      isLoadingStations = false;
    }
  }

  let isLoadingStations = false;
  function renderLoadingState(){
    if (!isLoadingStations) return;
    const el = document.getElementById('carousel');
    el.innerHTML = `<div class="loading-card glass"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>&nbsp;a procurar postos…</div>`;
  }

  function applyFilters(stations){
    return stations.filter(s => {
      if (state.freeOnly && !s.free) return false;
      if (state.powerFilter !== 'all'){
        const tier = powerTierOf(s.power);
        if (!tier || tier.key !== state.powerFilter) return false;
      }
      if (state.connectorFilter !== 'all'){
        const conns = (s.connectors || []).map(c => c.toLowerCase());
        const def = CONNECTOR_TYPES.find(c => c.key === state.connectorFilter);
        if (!def || !conns.some(c => def.match(c))) return false;
      }
      return true;
    });
  }

  async function computeList(){
    const stations = await fetchStations();
    let list = applyFilters(stations);
    list.sort((a,b) => a.dist - b.dist);
    return list;
  }

  // ---------- selection + distance HUD ----------
  let routeRequestToken = 0;

  function selectStation(s){
    state.selectedId = s ? s.id : null;
    if (hudLine){ map.removeLayer(hudLine); hudLine = null; }

    const hud = document.getElementById('distanceHud');
    if (!s){
      hud.classList.remove('show');
      renderAll();
      return;
    }

    document.getElementById('hudName').textContent = s.name;
    document.getElementById('hudSub').textContent = s.operator;
    const tagsEl = document.getElementById('hudTags');
    const gmapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}&travelmode=driving`;
    const wazeUrl = `https://waze.com/ul?ll=${s.lat},${s.lon}&navigate=yes`;
    tagsEl.innerHTML =
      `<a class="tag nav-tag" href="${gmapsUrl}" target="_blank" rel="noopener">🗺️ Google Maps</a>` +
      `<a class="tag nav-tag" href="${wazeUrl}" target="_blank" rel="noopener">🚗 Waze</a>` +
      (s.connectors||[]).slice(0,3).map(c=>`<span class="tag">${c}</span>`).join('') +
      (s.free ? '<span class="tag" style="color:#34D399">grátis</span>' : '');
    document.getElementById('hudDist').textContent = '···';
    document.getElementById('hudDistUnit').textContent = 'a calcular';
    hud.classList.add('show');

    // linha reta imediata, como referência enquanto a rota real carrega
    hudLine = L.polyline([[state.center.lat, state.center.lon],[s.lat, s.lon]], {
      color: '#5A6488', weight: 2, opacity: 0.7, dashArray: '5 7', className: 'hud-line'
    }).addTo(map);

    renderAll();
    fetchRoadRoute(s);
  }

  async function fetchRoadRoute(s){
    const myToken = ++routeRequestToken;
    try {
      const url = `/api/rota?fromLat=${state.center.lat}&fromLon=${state.center.lon}&toLat=${s.lat}&toLon=${s.lon}`;
      const res = await fetch(url);
      if (myToken !== routeRequestToken || state.selectedId !== s.id) return; // seleção mudou entretanto
      if (!res.ok){
        document.getElementById('hudDist').textContent = s.dist.toFixed(1);
        document.getElementById('hudDistUnit').textContent = 'km (linha reta)';
        return;
      }
      const data = await res.json();
      if (myToken !== routeRequestToken || state.selectedId !== s.id) return;

      document.getElementById('hudDist').textContent = data.distanceKm.toFixed(1);
      document.getElementById('hudDistUnit').textContent = Math.round(data.durationMin) + ' min de carro';

      if (hudLine){ map.removeLayer(hudLine); }
      hudLine = L.polyline(data.coordinates, {
        color: C.cyan, weight: 3, opacity: 0.85, className: 'hud-line'
      }).addTo(map);
    } catch (e) {
      if (myToken !== routeRequestToken || state.selectedId !== s.id) return;
      document.getElementById('hudDist').textContent = s.dist.toFixed(1);
      document.getElementById('hudDistUnit').textContent = 'km (linha reta)';
    }
  }

  document.getElementById('hudClose').addEventListener('click', () => selectStation(null));

  // ---------- render: map ----------
  function renderMap(list){
    document.getElementById('map').style.display = usingFallbackMap ? 'none' : 'block';
    document.getElementById('mapFallback').style.display = usingFallbackMap ? 'block' : 'none';

    if (usingFallbackMap){
      renderFallbackMap(list);
      return;
    }

    markersLayer.clearLayers();
    Object.keys(markersById).forEach(k => delete markersById[k]);

    // Nota: não chamamos map.setView aqui de propósito — selecionar um posto ou
    // atualizar a lista não deve mexer no zoom/posição que o utilizador escolheu.
    radiusCircle.setLatLng([state.center.lat, state.center.lon]);
    radiusCircle.setRadius(SEARCH_RADIUS_KM*1000);
    centerMarker.setLatLng([state.center.lat, state.center.lon]);

    list.forEach(s => {
      const col = colorForPower(s.power);
      const selected = state.selectedId === s.id;
      const size = selected ? 22 : 14;
      const icon = L.divIcon({
        className:'', iconSize:[size,size], iconAnchor:[size/2,size/2],
        html:`<div class="pin-dot ${selected?'selected':''}" style="width:${size}px;height:${size}px;background:${col};color:${col};">${selected?'⚡':''}</div>`
      });
      const marker = L.marker([s.lat, s.lon], { icon }).addTo(markersLayer);
      const powerTxt = s.power ? s.power + ' kW' : 'potência não indicada';
      const connTxt = s.connectors ? s.connectors.join(', ') : '';
      marker.bindPopup(`<div class="popup-name">${s.name}</div><div class="popup-sub">${s.operator}${connTxt?' · '+connTxt:''}</div><div class="popup-power" style="color:${col}">${powerTxt}</div>`, { closeButton:false, autoClose:true });
      marker.on('click', () => { selectStation(s); marker.openPopup(); });
      markersById[s.id] = marker;
    });
  }

  function renderFallbackMap(list){
    const size = 320, cx = size/2, cy = size/2, maxR = 140;
    const pxPerKm = maxR/SEARCH_RADIUS_KM;
    const rings = [SEARCH_RADIUS_KM*0.34, SEARCH_RADIUS_KM*0.67, SEARCH_RADIUS_KM];

    let svg = `<svg viewBox="0 0 ${size} ${size}" width="100%" height="100%" style="display:block">`;
    svg += `<rect width="${size}" height="${size}" fill="#04070D"/>`;
    rings.forEach(r => {
      const rp = r*pxPerKm;
      svg += `<circle cx="${cx}" cy="${cy}" r="${rp}" fill="none" stroke="rgba(148,178,255,0.16)" stroke-width="1" stroke-dasharray="3 4"/>`;
      svg += `<text x="${cx+5}" y="${cy-rp-3}" fill="#5A6488" font-size="9" font-family="JetBrains Mono, monospace">${Math.round(r)}km</text>`;
    });

    if (state.selectedId){
      const sel = list.find(s => s.id === state.selectedId);
      if (sel){
        const bearing = bearingDeg(state.center.lat, state.center.lon, sel.lat, sel.lon);
        const rp = Math.min(sel.dist, SEARCH_RADIUS_KM) * pxPerKm;
        const rad = toRad(bearing);
        const x = cx + rp*Math.sin(rad), y = cy - rp*Math.cos(rad);
        svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${C.cyan}" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.8"/>`;
      }
    }

    list.forEach(s => {
      const bearing = bearingDeg(state.center.lat, state.center.lon, s.lat, s.lon);
      const rp = Math.min(s.dist, SEARCH_RADIUS_KM) * pxPerKm;
      const rad = toRad(bearing);
      const x = cx + rp*Math.sin(rad), y = cy - rp*Math.cos(rad);
      const col = colorForPower(s.power);
      const selected = state.selectedId === s.id;
      svg += `<g transform="translate(${x},${y})" data-id="${s.id}" class="fb-pin" style="cursor:pointer">
        <circle r="${selected?9:6}" fill="${col}" stroke="#05070C" stroke-width="2"/>
        ${selected ? `<text y="-13" text-anchor="middle" fill="#E8ECFB" font-size="9" font-weight="700" font-family="JetBrains Mono, monospace">${s.power?s.power+'kW':'—'}</text>` : ''}
      </g>`;
    });

    svg += `<circle cx="${cx}" cy="${cy}" r="5" fill="url(#centerGrad)" stroke="#fff" stroke-width="1.5"/>`;
    svg += `<defs><radialGradient id="centerGrad"><stop offset="0%" stop-color="${C.cyan}"/><stop offset="100%" stop-color="${C.violet}"/></radialGradient></defs>`;
    svg += `</svg>`;
    const el = document.getElementById('mapFallback');
    el.innerHTML = svg;
    el.querySelectorAll('.fb-pin').forEach(g => {
      g.addEventListener('click', () => {
        const id = g.getAttribute('data-id');
        const s = list.find(x => x.id === id);
        if (s) selectStation(s);
      });
    });
  }

  // ---------- render: carousel ----------
  function renderCarousel(list){
    const el = document.getElementById('carousel');
    if (list.length === 0){
      el.innerHTML = `<div class="empty-card glass">Sem postos com estes filtros. Aumenta o raio ou ajusta os filtros.</div>`;
      return;
    }
    el.innerHTML = list.map(s => {
      const col = colorForPower(s.power);
      const selected = state.selectedId === s.id;
      return `<div class="ev-card glass ${selected?'selected':''}" data-id="${s.id}">
        <div class="top-row">
          <div class="name">${s.name}</div>
          <div class="power mono" style="color:${col}">${s.power||'—'}</div>
        </div>
        <div class="sub">${s.operator}</div>
        <div class="dist">${s.dist.toFixed(1)} km${s.free ? ' · grátis' : ''}</div>
      </div>`;
    }).join('');
    el.querySelectorAll('.ev-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        const s = list.find(x => x.id === id);
        if (s){
          selectStation(s);
          map.panTo([s.lat, s.lon]);
          const m = markersById[id];
          if (m) m.openPopup();
          card.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
        }
      });
    });
  }

  // ---------- filters ----------
  function renderFilterChips(){
    const powerEl = document.getElementById('powerFilters');
    powerEl.innerHTML =
      `<button class="chip ${state.powerFilter==='all'?'active-neutral':''}" data-power="all">Todas</button>` +
      POWER_TIERS.map(t => `<button class="chip ${state.powerFilter===t.key?'active-'+t.key:''}" data-power="${t.key}">⚡ ${t.label}</button>`).join('') +
      `<button class="chip ${state.freeOnly?'active-free':''}" data-free="1">Grátis</button>`;
    powerEl.querySelectorAll('[data-power]').forEach(btn => {
      btn.addEventListener('click', () => { state.powerFilter = btn.getAttribute('data-power'); refreshFilterTrigger(); renderAll(); });
    });
    powerEl.querySelector('[data-free]').addEventListener('click', () => { state.freeOnly = !state.freeOnly; refreshFilterTrigger(); renderAll(); });

    const connEl = document.getElementById('connectorFilters');
    connEl.innerHTML =
      `<button class="chip ${state.connectorFilter==='all'?'active-neutral':''}" data-conn="all">Todas as tomadas</button>` +
      CONNECTOR_TYPES.map(c => `<button class="chip ${state.connectorFilter===c.key?'active-neutral':''}" data-conn="${c.key}">${c.label}</button>`).join('');
    connEl.querySelectorAll('[data-conn]').forEach(btn => {
      btn.addEventListener('click', () => { state.connectorFilter = btn.getAttribute('data-conn'); refreshFilterTrigger(); renderAll(); });
    });
  }
  function refreshFilterTrigger(){
    const parts = [];
    if (state.powerFilter !== 'all'){
      const t = POWER_TIERS.find(t => t.key === state.powerFilter);
      if (t) parts.push(t.label.split(' ')[0]); // "Lenta"/"Rápida"/"Ultra"
    }
    if (state.connectorFilter !== 'all'){
      const c = CONNECTOR_TYPES.find(c => c.key === state.connectorFilter);
      if (c) parts.push(c.label);
    }
    if (state.freeOnly) parts.push('Grátis');

    const active = parts.length > 0;
    document.getElementById('filterTrigger').classList.toggle('active', active);
    document.getElementById('filterTriggerLabel').textContent = active ? parts.join(' · ') : 'Filtros';
  }

  document.getElementById('filterTrigger').addEventListener('click', () => {
    document.getElementById('infoBox').classList.remove('open');
    infoOpen = false;
    document.getElementById('filterPanel').classList.toggle('open');
  });

  // ---------- zoom control ----------
  document.getElementById('zoomInBtn').addEventListener('click', () => {
    if (!usingFallbackMap) map.zoomIn();
  });
  document.getElementById('zoomOutBtn').addEventListener('click', () => {
    if (!usingFallbackMap) map.zoomOut();
  });

  // ---------- master render ----------
  async function renderAll(){
    document.getElementById('locLabel').textContent = state.center.name;
    const myToken = ++renderToken;
    const list = await computeList();
    if (myToken !== renderToken) return;
    renderMap(list);
    renderCarousel(list);
  }

  // ---------- info box ----------
  let infoOpen = false;
  document.getElementById('infoBtn').addEventListener('click', () => {
    infoOpen = !infoOpen;
    document.getElementById('filterPanel').classList.remove('open');
    document.getElementById('infoBox').classList.toggle('open', infoOpen);
  });

  // ---------- location sheet ----------
  const sheetBackdrop = document.getElementById('sheetBackdrop');
  document.getElementById('locBar').addEventListener('click', () => {
    sheetBackdrop.classList.add('open');
    document.getElementById('townSearch').value = '';
    renderSuggestions();
  });
  document.getElementById('sheetClose').addEventListener('click', () => sheetBackdrop.classList.remove('open'));
  sheetBackdrop.addEventListener('click', (e) => { if (e.target === sheetBackdrop) sheetBackdrop.classList.remove('open'); });

  document.getElementById('geoBtn').addEventListener('click', () => {
    const statusEl = document.getElementById('geoStatus');
    if (!navigator.geolocation){ statusEl.textContent = 'Geolocalização não suportada neste navegador.'; return; }
    statusEl.textContent = 'A localizar…';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        state.center = { name:'A minha localização', lat: pos.coords.latitude, lon: pos.coords.longitude };
        statusEl.textContent = '';
        sheetBackdrop.classList.remove('open');
        recenterMap();
        selectStation(null);
      },
      (err) => {
        const reasons = {
          1: 'Permissão bloqueada (comum na pré-visualização do Claude). Abre o link no browser, ou insere manualmente.',
          2: 'Localização indisponível. Insere manualmente abaixo.',
          3: 'Demorou demasiado tempo. Tenta novamente ou insere manualmente.',
        };
        statusEl.textContent = reasons[err.code] || ('Erro: ' + err.message);
      },
      { enableHighAccuracy:true, timeout:8000 }
    );
  });

  function selectPlace(name, lat, lon){
    state.center = { name, lat, lon };
    document.getElementById('townSearch').value = '';
    sheetBackdrop.classList.remove('open');
    recenterMap();
    selectStation(null);
  }

  function renderSuggestions(){
    document.getElementById('townListLabel').textContent = 'Sugestões';
    document.getElementById('searchStatus').textContent = '';
    const townListEl = document.getElementById('townList');
    townListEl.innerHTML = TOWNS.map(t => `
      <button class="town-btn ${t.name===state.center.name?'active':''}" data-name="${t.name}" data-lat="${t.lat}" data-lon="${t.lon}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8892B8" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</span>
      </button>`).join('');
    wireTownButtons();
  }

  function wireTownButtons(){
    document.querySelectorAll('#townList .town-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectPlace(btn.getAttribute('data-name'), parseFloat(btn.getAttribute('data-lat')), parseFloat(btn.getAttribute('data-lon')));
      });
    });
  }

  let searchDebounce = null;
  let searchToken = 0;

  document.getElementById('townSearch').addEventListener('input', () => {
    const q = document.getElementById('townSearch').value.trim();
    clearTimeout(searchDebounce);
    if (q.length < 2){
      renderSuggestions();
      return;
    }
    document.getElementById('townListLabel').textContent = 'Resultados';
    document.getElementById('searchStatus').textContent = 'A procurar…';
    searchDebounce = setTimeout(() => runGeocodeSearch(q), 400);
  });

  async function runGeocodeSearch(q){
    const myToken = ++searchToken;
    try {
      const res = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
      if (myToken !== searchToken) return;
      const json = await res.json();
      const results = Array.isArray(json.results) ? json.results : [];
      const statusEl = document.getElementById('searchStatus');
      const townListEl = document.getElementById('townList');
      if (results.length === 0){
        statusEl.textContent = '';
        townListEl.innerHTML = `<div style="font-size:12px;color:var(--text-muted);padding:10px 4px;">Nenhum resultado encontrado.</div>`;
        return;
      }
      statusEl.textContent = '';
      townListEl.innerHTML = results.map(r => `
        <button class="town-btn" data-name="${r.name.replace(/"/g,'&quot;')}" data-lat="${r.lat}" data-lon="${r.lon}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8892B8" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.name}</span>
        </button>`).join('');
      wireTownButtons();
    } catch (e) {
      if (myToken !== searchToken) return;
      document.getElementById('searchStatus').textContent = 'Falha na pesquisa. Tenta novamente.';
    }
  }

  // ---------- boot ----------
  renderFilterChips();
  refreshFilterTrigger();
  renderAll();
  setTimeout(() => map.invalidateSize(), 200);
})();
</script>
